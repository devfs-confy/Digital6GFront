name: Build and PR to deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}

      - name: Checkout deploy branch
        uses: actions/checkout@v4
        with:
          ref: deploy
          path: deploy-branch
          fetch-depth: 0

      - name: Copy dist to deploy branch
        run: |
          rm -rf deploy-branch/*
          cp -r dist/. deploy-branch/

      - name: Commit dist to a temp branch and open PR
        run: |
          cd deploy-branch

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="deploy-update-${{ github.run_number }}"
          git checkout -b "$BRANCH"

          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "build: dist from main @ ${{ github.sha }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Deploy: build from main (${{ github.sha }})" \
            --body "Build automático del \`dist\` generado desde el commit [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) en \`main\`." \
            --base deploy \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
